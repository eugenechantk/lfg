name: LFG
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    SWIFT_STRICT_CONCURRENCY: complete
    TARGETED_DEVICE_FAMILY: "1,2"
packages:
  LFGCore:
    path: LFGCore
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"
targets:
  LFG:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LFG
    dependencies:
      - package: LFGCore
        product: LFGCore
      - package: MarkdownUI
        product: MarkdownUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eugenechan.lfg
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 39GJBP8V5A
        SUPPORTS_MACCATALYST: false
      configs:
        # APNs environment is build-config driven so archives default to the
        # production APNs environment that TestFlight/App Store require, while
        # local Debug builds keep using the sandbox.
        Debug:
          APS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production
    entitlements:
      path: LFG/LFG.entitlements
      properties:
        # Driven by APS_ENVIRONMENT (Debug=development, Release=production) so the
        # archived TestFlight/App Store build uses the production APNs environment.
        aps-environment: $(APS_ENVIRONMENT)
    info:
      path: LFG/Info.plist
      properties:
        CFBundleDisplayName: lfg
        # App uses only standard HTTPS/TLS -> exempt from export compliance.
        # Baked in so TestFlight uploads don't pause for the encryption question.
        ITSAppUsesNonExemptEncryption: false
        # Launch screen: black background + centered mark (LaunchScreen.storyboard).
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
schemes:
  LFG:
    build:
      targets:
        LFG: all
    run:
      config: Debug
    archive:
      config: Release
