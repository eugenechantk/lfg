name: LFG
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    SWIFT_STRICT_CONCURRENCY: complete
    TARGETED_DEVICE_FAMILY: "1,2"
packages:
  LFGCore:
    path: LFGCore
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.0"
targets:
  LFG:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LFG
    dependencies:
      - package: LFGCore
        product: LFGCore
      - package: MarkdownUI
        product: MarkdownUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.omg.lfg
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 39GJBP8V5A
        SUPPORTS_MACCATALYST: false
    entitlements:
      path: LFG/LFG.entitlements
      properties:
        # Sandbox APNs for Debug/dev builds. Archiving for TestFlight/App Store
        # needs this set to "production" (or an xcconfig-driven value).
        aps-environment: development
    info:
      path: LFG/Info.plist
      properties:
        CFBundleDisplayName: lfg
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
schemes:
  LFG:
    build:
      targets:
        LFG: all
    run:
      config: Debug
    archive:
      config: Release
